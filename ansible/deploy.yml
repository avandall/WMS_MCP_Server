---
# Ansible playbook for deploying WMS MCP Server

- name: Deploy WMS MCP Server
  hosts: wms_servers
  become: yes
  vars:
    app_dir: /opt/wms-mcp-server
    repo_url: https://github.com/your-org/wms-mcp-server.git
    branch: main
    python_version: 3.11
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
    
    - name: Install system dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
          - git
          - postgresql-client
          - redis-tools
        state: present
    
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
    
    - name: Clone repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ branch }}"
        force: yes
      become_user: ubuntu
    
    - name: Create Python virtual environment
      command: python3 -m venv {{ app_dir }}/venv
      args:
        creates: "{{ app_dir }}/venv"
      become_user: ubuntu
    
    - name: Install Python dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"
      become_user: ubuntu
    
    - name: Create systemd service file
      template:
        src: wms-mcp-server.service.j2
        dest: /etc/systemd/system/wms-mcp-server.service
        mode: '0644'
    
    - name: Enable and start WMS MCP Server service
      systemd:
        name: wms-mcp-server
        enabled: yes
        state: restarted
        daemon_reload: yes
    
    - name: Wait for service to be ready
      wait_for:
        port: 8000
        delay: 10
        timeout: 60
    
    - name: Verify service is running
      uri:
        url: http://localhost:8000/health
        method: GET
        status_code: 200
      register: result
      until: result.status == 200
      retries: 5
      delay: 5

- name: Configure monitoring
  hosts: wms_servers
  become: yes
  
  tasks:
    - name: Install Prometheus node exporter
      apt:
        name: prometheus-node-exporter
        state: present
    
    - name: Enable and start node exporter
      systemd:
        name: prometheus-node-exporter
        enabled: yes
        state: started

- name: Configure log rotation
  hosts: wms_servers
  become: yes
  
  tasks:
    - name: Create logrotate configuration
      copy:
        content: |
          /var/log/wms-mcp-server/*.log {
            daily
            rotate 14
            compress
            delaycompress
            missingok
            notifempty
            create 0640 ubuntu ubuntu
          }
        dest: /etc/logrotate.d/wms-mcp-server
        mode: '0644'
