---
# Ansible playbook for infrastructure monitoring

- name: Configure Infrastructure Monitoring
  hosts: wms_servers
  become: yes
  
  tasks:
    - name: Install Prometheus
      apt:
        name: prometheus
        state: present
    
    - name: Configure Prometheus
      copy:
        content: |
          global:
            scrape_interval: 15s
          
          scrape_configs:
            - job_name: 'wms_mcp_server'
              static_configs:
                - targets: ['localhost:8000']
            
            - job_name: 'node_exporter'
              static_configs:
                - targets: ['localhost:9100']
        dest: /etc/prometheus/prometheus.yml
        mode: '0644'
    
    - name: Enable and start Prometheus
      systemd:
        name: prometheus
        enabled: yes
        state: restarted
    
    - name: Install Grafana
      apt:
        name: grafana
        state: present
    
    - name: Enable and start Grafana
      systemd:
        name: grafana-server
        enabled: yes
        state: started
    
    - name: Configure Grafana datasource
      uri:
        url: http://localhost:3000/api/datasources
        method: POST
        user: admin
        password: admin
        body_format: json
        body:
          name: Prometheus
          type: prometheus
          url: http://localhost:9090
        status_code: 200

- name: Configure CloudWatch Agent
  hosts: wms_servers
  become: yes
  
  tasks:
    - name: Install CloudWatch agent
      apt:
        name: amazon-cloudwatch-agent
        state: present
    
    - name: Configure CloudWatch agent
      copy:
        content: |
          {
            "metrics": {
              "metrics_collected": {
                "mem": {
                  "measurement": ["mem_used_percent"]
                },
                "cpu": {
                  "measurement": ["cpu_usage_idle", "cpu_usage_iowait"]
                }
              },
              "append_dimensions": {
                "InstanceId": "${aws:InstanceId}"
              }
            }
          }
        dest: /opt/aws/amazon-cloudwatch-agent/etc/config.json
        mode: '0644'
    
    - name: Enable and start CloudWatch agent
      systemd:
        name: amazon-cloudwatch-agent
        enabled: yes
        state: started
